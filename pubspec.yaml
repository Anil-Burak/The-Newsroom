name: gatekeeper
description: "GateKeeper - An interactive simulation of Gatekeeping Theory in mass communication."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  # ── State Management ──────────────────────────────────────────────────────
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # ── Local Database ────────────────────────────────────────────────────────
  sqflite: ^2.3.3+1
  path: ^1.9.0

  # ── Networking (OpenAI direct HTTP) ───────────────────────────────────────
  http: ^1.2.2

  # ── Swipe Card Mechanics ──────────────────────────────────────────────────
  appinio_swiper: ^2.1.1

  # ── Dynamic Newspaper Layouts ─────────────────────────────────────────────
  flutter_staggered_grid_view: ^0.7.0

  # ── Image & Network ───────────────────────────────────────────────────────
  cached_network_image: ^3.3.1

  # ── Typography ────────────────────────────────────────────────────────────
  google_fonts: ^6.2.1

  # ── Routing ───────────────────────────────────────────────────────────────
  go_router: ^14.2.7

  # ── Animations ────────────────────────────────────────────────────────────
  lottie: ^3.1.2
  shimmer: ^3.0.0

  # ── Utilities ─────────────────────────────────────────────────────────────
  uuid: ^4.4.2
  equatable: ^2.0.5
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.3

flutter:
  uses-material-design: true
